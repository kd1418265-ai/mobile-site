<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ビューポート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: auto;
        }

        div {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
            text-shadow: 1px 1px 5px #000;
        }

        div:nth-child(1) {
            background-color: #ef9a9a;
        }

        div:nth-child(2) {
            background-color: #ce93d8;
        }

        div:nth-child(3) {
            background-color: #9fa8da;
        }

        div:nth-child(4) {
            background-color: #80deea;
        }

        div:nth-child(5) {
            background-color: #a5d6a7;
        }

        div:nth-child(6) {
            background-color: #222;
        }

        div:nth-child(7) {
            background-color: #444;
        }

        div:nth-child(8) {
            background-color: #e6ee9c;
        }
    </style>
</head>

<body>
    <div style="width: 1200px">1200px</div>
    <div style="width: 980px">980px</div>
    <div style="width: 800px">800px</div>
    <div style="width: 640px">640px</div>
    <div style="width: 480px">480px</div>
    <div style="width: 390px">390px (iPhone 12/13/14)</div>
    <div style="width: 375px">375px (iPhone mini/SE)</div>
    <div style="width: 320px">320px</div>
</body>

</html>
