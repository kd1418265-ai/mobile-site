<!DOCTYPE HTML>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像の高解像度対応</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
        }

        .container div {
            margin-bottom: 40px;
        }

        span {
            display: block;
            padding-top: 0.25em;
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>
            <img src="google_logo_half.png" width="300" height="100" alt="">
            <span>150px x 50px</span>
        </div>

        <div>
            <img src="google_logo.png" width="300" height="100" alt="">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="google_logo@2x.png" width="300" height="100" alt="">
            <span>600px x 200px</span>
        </div>

        <div>
            <img src="google_logo.svg" width="300" height="100" alt="">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="photo_half.jpg" width="300" height="200" alt="">
            <span>150px x 100px</span>
        </div>

        <div>
            <img src="photo.jpg" width="300" height="200" alt="">
            <span>300px x 200px</span>
        </div>

        <div>
            <img src="photo@2x.jpg" width="300" height="200" alt="">
            <span>600px x 400px</span>
        </div>
    </div>
</body>

</html>
